<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortly</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <!-- Links -->
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <header class="header">
        <div class="container site-header">

            <a class="site-header__img" href="#">
                <img class="site-header__logo" src="img/Shortly.svg" alt="logo" width="120" height="32">
            </a>

            <nav class="sitenav">
                <div class="sitenav">
                    <ul class="sitenav__list">
                        <li class="sitenav__item">Features</li>
                        <li class="sitenav__item">Pricing</li>
                        <li class="sitenav__item">Resources</li>
                    </ul>
                </div>
            </nav>

            <div class="login">
                <a class="login__link" href="#">Login</a>
                <a class="button-link" href="#">Sign Up</a>
            </div>

        </div>
    </header>

    <!-- Hero -->
<div class="hero container">
    <div class="hero__wrapper hero-section">
        <div class="hero-section__inner">
            <h1 class="hero__heading">More than just<br>shorter links</h1>
            <p class="hero__text">Build your brand’s recognition and get detailed<br>insights on how your links are performing.</p>
            <a class="button-link hero__button" href="#">Get Started</a>
        </div>

        <div class="hero__png">
            <img class="hero-img" src="img/working_with_computer.png" alt="working with computer" width="733" height="482">
        </div>

    </div>
</div>
    
    <script src="js/main.js"></script>
</body>
</html>
